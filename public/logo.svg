<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="512" height="512">
  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="#4f46e5"/>

  <!-- Top-left finder pattern -->
  <rect x="11" y="11" width="30" height="30" rx="4" fill="white"/>
  <rect x="16" y="16" width="20" height="20" rx="2" fill="#4f46e5"/>
  <rect x="20" y="20" width="12" height="12" rx="1" fill="white"/>

  <!-- Top-right finder pattern -->
  <rect x="59" y="11" width="30" height="30" rx="4" fill="white"/>
  <rect x="64" y="16" width="20" height="20" rx="2" fill="#4f46e5"/>
  <rect x="68" y="20" width="12" height="12" rx="1" fill="white"/>

  <!-- Bottom-left finder pattern -->
  <rect x="11" y="59" width="30" height="30" rx="4" fill="white"/>
  <rect x="16" y="64" width="20" height="20" rx="2" fill="#4f46e5"/>
  <rect x="20" y="68" width="12" height="12" rx="1" fill="white"/>

  <!-- Data dots (bottom-right quadrant) -->
  <rect x="60" y="60" width="9" height="9" rx="2" fill="white"/>
  <rect x="73" y="60" width="9" height="9" rx="2" fill="white" opacity="0.7"/>
  <rect x="82" y="60" width="9" height="9" rx="2" fill="white" opacity="0.4"/>
  <rect x="60" y="73" width="9" height="9" rx="2" fill="white" opacity="0.5"/>
  <rect x="73" y="73" width="9" height="9" rx="2" fill="white"/>
  <rect x="60" y="82" width="9" height="9" rx="2" fill="white" opacity="0.35"/>
  <rect x="73" y="82" width="9" height="9" rx="2" fill="white" opacity="0.6"/>

  <!-- Scan line -->
  <rect x="6" y="47" width="88" height="6" rx="3" fill="white" opacity="0.95"/>
</svg>
